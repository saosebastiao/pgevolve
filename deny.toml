# pgevolve license + advisory policy for cargo-deny.
# Enforces docs/CONSTITUTION.md: MIT/Apache-2.0 + permissive licenses only; no copyleft;
# no vulnerable or unmaintained dependencies.

[graph]
all-features = true

[advisories]
version = 2
# Use empty ignore list so we can audit all security advisories.
ignore = []
yanked = "deny"
# cargo-deny 0.19 (PR #611) consolidated the advisory schema. The
# `vulnerability` and `notice` keys were removed — vulnerabilities are
# always errors and notices are always warnings; tune via `ignore` if
# needed. `unmaintained` was migrated to a granular enum; "all"
# matches the pre-0.19 behaviour of flagging direct + transitive.
unmaintained = "all"

[licenses]
version = 2
# Strict allowlist: only truly permissive licenses.
# MIT/Apache-2.0 are primary; BSD-family, ISC, Unicode-DFS-2016 (unicode-ident),
# CC0-1.0 (for testkit), and Zlib are acceptable per docs/CONSTITUTION.md.
# Note: Unicode-3.0 may appear in unicode-ident; both are permissive.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
# No explicit deny list needed; anything not in allow[] is rejected.
confidence-threshold = 0.93
exceptions = []

[bans]
# Warn on multiple versions (expected in large dep trees) rather than fail.
multiple-versions = "warn"
# Disallow wildcard version specs in direct dependencies.
wildcards = "deny"
# Workspace-internal `{ path = "..." }` deps without a version field show up
# as wildcards but are perfectly safe (they resolve to the local source tree,
# not to crates.io). cargo-deny 0.19 began flagging these by default; opt in.
allow-wildcard-paths = true

[sources]
# Restrict package sources to crates.io (via GitHub registry mirror).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
