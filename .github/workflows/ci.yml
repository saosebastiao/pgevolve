name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (unit + tier-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib --tests
        env:
          # Tier-3+ tests require ephemeral PG containers; gate them via
          # this env var so CI can opt in once the harness exists (phase 3).
          PGEVOLVE_DISABLE_DOCKER_TESTS: "1"

  property-status:
    name: Property-test issue compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask property-status --max-age-days 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conformance:
    name: conformance (tier 3 + tier C)
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: 1.95 }
      - uses: Swatinem/rust-cache@v2
      - name: tier-3 catalog goldens + tier-C conformance
        run: cargo test --workspace --tests
        env:
          PGEVOLVE_TEST_PG_VERSION: ${{ matrix.pg }}
          # PROPTEST_CASES intentionally unset — property tests are now
          # #[ignore]'d by default. The property-tests.yml workflow runs
          # them on a schedule.
