name: property-tests

on:
  schedule:
    # Daily at 04:00 UTC. Adjust to taste; the spec calls for nightly.
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  property:
    name: property tests (pg ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: 1.95 }
      - uses: Swatinem/rust-cache@v2
      - name: property tests
        run: cargo test --workspace --tests -- --ignored
        env:
          PGEVOLVE_TEST_PG_VERSION: ${{ matrix.pg }}
          PROPTEST_CASES: "200"
      - name: Auto-capture property-test failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for regr in crates/*/proptest-regressions/*.txt; do
            [ -f "$regr" ] || continue
            seed=$(head -1 "$regr" | awk '{print $1}')
            [ -n "$seed" ] || continue
            # Resolve or create an issue for this failure (manual triage may
            # be needed; for now, just log the seed so a maintainer can run
            # `cargo xtask capture-regression --seed X --issue Y` manually).
            echo "::warning::Property-test failure with seed $seed — run 'cargo xtask capture-regression --seed $seed --issue <n>' to capture"
          done
