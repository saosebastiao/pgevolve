[meta]
title     = "owner self-grants in source are silently dropped at canon time — no REVOKE emitted"
authoring = "objects"
spec_refs = ["lint.revoke-from-owner"]

[pg]
min = 14
max = 17

# before.sql carries an explicit GRANT SELECT TO app_owner (the owner).
# The canon pass strips owner self-grants from both source and target so the
# diff is empty and no REVOKE step is generated.  The `revoke-from-owner` lint
# never fires because the asymmetry is resolved before diffing.
[expect.plan]
steps     = 0
golden    = false
