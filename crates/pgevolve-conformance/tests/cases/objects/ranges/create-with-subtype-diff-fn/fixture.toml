[meta]
title     = "CREATE TYPE AS RANGE with user-defined subtype_diff function — exercises dep-graph Function -> Range edge"
authoring = "objects"
spec_refs = ["types.range.create"]

# Substituted for the originally-planned `canonical` fixture: PG canonical
# functions must accept and return the range type itself, which requires the
# CREATE TYPE shell-type form (CREATE TYPE name; … ; CREATE TYPE name AS
# RANGE …). pgevolve does not yet parse the shell-type form. The dep-graph
# wiring is identical — both canonical and subtype_diff add a
# NodeId::Function -> NodeId::Type edge (see plan/edges.rs build_create_graph
# for ranges) — so this fixture exercises the same code path with a function
# signature PG can actually accept stand-alone.
[pg]
min = 14
max = 18

# Apply disabled: same Stage 1 catalog-reader limitation as
# create-with-opclass — the reader rehydrates a resolved subtype_opclass and
# the auto-generated multirange typname instead of preserving the source's
# None / None. Parse + diff + plan + dep-graph are still exercised.
[fixture]
apply = false

[expect.plan]
steps = 2
