[meta]
title     = "Lenient drift: live has event trigger, source drops it — 0 plan steps"
authoring = "objects"
spec_refs = ["objects.event_trigger", "lint.unmanaged-event-trigger"]

[pg]
min = 14
max = 18

# The differ uses a lenient policy: event triggers absent from source are NOT
# dropped. This fixture verifies that removing an event trigger from source does
# not produce a DROP step. The unmanaged-event-trigger advisory fires via
# run_drift_lints (real-catalog path) rather than the in-process pipeline, so
# it is not asserted here; unit tests in lint/rules/unmanaged_event_trigger
# cover it.
[expect.plan]
steps      = 0
minimality = false
golden     = false
