[meta]
title     = "lint cast-references-unmanaged-function — WITH FUNCTION is not a managed function"
authoring = "objects"
spec_refs = ["objects.cast"]

# The `cast-references-unmanaged-function` lint rule has Error severity
# (not LintAtPlan). It fires in check_universal() during CLI execution because
# the conversion function (`app.ghost_cast_fn`) is not declared as a managed
# SQL/plpgsql function in source — so the cast → function dependency is
# unmanageable. It does not block the in-process planner used by the
# conformance suite, so the CREATE CAST step is still produced. The rule is
# unit-tested in pgevolve-core/src/lint/rules/cast_unmanaged_function.rs.
# This fixture confirms the planner still produces a valid CREATE CAST step.

[pg]
min = 14
max = 18

[expect.plan]
steps = 1

[expect.apply]
# app.ghost_cast_fn is not declared in SQL, so CREATE CAST fails at apply
# time against a real Postgres. This is the expected behavior — the unmanaged
# cast function does not exist for the cast to bind to.
succeeds = false
error_contains = ["ghost_cast_fn"]
